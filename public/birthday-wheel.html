<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎂 生日礼物·幸运星云转盘</title>
  <style>
    :root {
      --bg-1: #0b1023;
      --bg-2: #1f1145;
      --bg-3: #3b1163;
      --text: #f8f7ff;
      --soft: #d8d1ff;
      --gold: #ffdc7c;
      --glass: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.28);
      --panel-shadow: 0 30px 60px rgba(6, 8, 27, 0.55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", "SF Pro Display", system-ui, sans-serif;
      background:
        radial-gradient(1000px 600px at -10% -20%, rgba(105, 180, 255, 0.25), transparent 55%),
        radial-gradient(900px 640px at 115% -10%, rgba(255, 86, 181, 0.28), transparent 52%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
      overflow: hidden;
    }

    .aurora,
    .aurora::before,
    .aurora::after {
      content: "";
      position: fixed;
      inset: -15vmax;
      pointer-events: none;
      background-repeat: no-repeat;
      mix-blend-mode: screen;
    }

    .aurora {
      background-image: radial-gradient(circle at 30% 35%, rgba(101, 241, 255, 0.18), transparent 46%);
      animation: drift 18s linear infinite;
    }

    .aurora::before {
      background-image: radial-gradient(circle at 68% 25%, rgba(255, 112, 199, 0.2), transparent 44%);
      animation: drift 24s linear infinite reverse;
    }

    .aurora::after {
      background-image: radial-gradient(circle at 50% 70%, rgba(255, 228, 141, 0.16), transparent 40%);
      animation: drift 26s ease-in-out infinite;
    }

    @keyframes drift {
      50% { transform: translate3d(0, -16px, 0) scale(1.03); }
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.62;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.95) 1px, transparent 1.1px),
        radial-gradient(circle, rgba(255,220,124,.9) 1.2px, transparent 1.3px),
        radial-gradient(circle, rgba(119,238,255,.7) 1px, transparent 1.1px);
      background-size: 95px 95px, 140px 140px, 210px 210px;
      background-position: 0 0, 42px 36px, 80px 120px;
      animation: rise 30s linear infinite;
    }

    @keyframes rise {
      to { transform: translateY(-110px); }
    }

    .container {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .panel {
      width: min(1020px, 100%);
      border-radius: 32px;
      border: 1px solid var(--glass-border);
      background: linear-gradient(130deg, rgba(255,255,255,0.15), rgba(255,255,255,0.06));
      backdrop-filter: blur(16px);
      box-shadow: var(--panel-shadow);
      padding: clamp(18px, 3vw, 34px);
      display: grid;
      gap: 24px;
      position: relative;
      overflow: hidden;
    }

    .panel::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      right: -140px;
      top: -120px;
      background: radial-gradient(circle, rgba(255,255,255,.23), transparent 70%);
    }

    .heading {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: .05em;
      text-shadow: 0 0 34px rgba(255, 132, 210, 0.55);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--soft);
      font-size: clamp(.95rem, 1.8vw, 1.15rem);
    }

    .main {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: clamp(16px, 2vw, 26px);
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .wheel-wrap {
      position: relative;
      width: min(76vw, 560px);
      aspect-ratio: 1;
      margin: 0 auto;
      filter: drop-shadow(0 24px 44px rgba(6, 4, 30, 0.62));
    }

    .pointer {
      position: absolute;
      left: 50%;
      top: -16px;
      transform: translateX(-50%);
      z-index: 9;
      width: 58px;
      aspect-ratio: 1;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      background: linear-gradient(180deg, #fff7da, #ffb84f);
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(255, 192, 91, .75);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      50% { transform: translateX(-50%) translateY(-2px) scale(1.04); }
    }

    .wheel {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 9px solid rgba(255, 247, 217, 0.55);
      background: conic-gradient(
        from -90deg,
        #ff5e99 0deg 72deg,
        #ff8f55 72deg 144deg,
        #ffd76b 144deg 216deg,
        #70df98 216deg 288deg,
        #57c8ff 288deg 360deg
      );
      transition: transform 5.6s cubic-bezier(.15,.94,.2,1);
      overflow: hidden;
    }

    .wheel::before,
    .wheel::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      inset: 18px;
      border: 2px dashed rgba(255, 255, 255, 0.4);
    }

    .wheel::after {
      inset: 34px;
      border-style: solid;
      border-color: rgba(255,255,255,.18);
    }

    .segment-label {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 45%;
      transform-origin: 0 0;
      color: #fff;
      font-weight: 800;
      letter-spacing: .02em;
      font-size: clamp(.8rem, 1.45vw, 1.04rem);
      text-shadow: 0 2px 6px rgba(0,0,0,0.34);
      user-select: none;
    }

    .hub {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 104px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 28%, #fff9df, #ffc458 65%, #b86b0a);
      border: 5px solid rgba(255, 245, 214, 0.9);
      color: #603200;
      display: grid;
      place-items: center;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.2;
      z-index: 8;
      box-shadow: 0 8px 30px rgba(255, 190, 76, 0.45);
    }

    .side {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: clamp(16px, 2vw, 22px);
      display: grid;
      gap: 14px;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 800;
      transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
    }

    #spinBtn {
      background: linear-gradient(90deg, #ffd977, #fff2c7);
      color: #5e2f00;
      box-shadow: 0 10px 20px rgba(255, 213, 113, .35), 0 0 20px rgba(255, 213, 113, .45);
    }

    #resetBtn {
      color: #f0e8ff;
      background: linear-gradient(90deg, #7658ff, #ad6fff);
      box-shadow: 0 10px 20px rgba(128, 95, 255, .32), 0 0 20px rgba(151, 91, 255, .38);
    }

    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: .56; cursor: not-allowed; transform: none; }

    .result {
      min-height: 72px;
      border-radius: 14px;
      padding: 12px;
      background: rgba(10, 6, 35, 0.4);
      border: 1px solid rgba(255,255,255,.2);
      color: #ffe8a7;
      font-size: clamp(.96rem, 1.55vw, 1.14rem);
      font-weight: 700;
      line-height: 1.6;
      text-shadow: 0 0 14px rgba(255, 215, 110, 0.45);
    }

    .gift-title {
      margin: 2px 0;
      color: #f4eeff;
      font-size: .95rem;
      opacity: .9;
    }

    .gifts {
      list-style: none;
      margin: 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(7, 6, 30, 0.38);
      border: 1px solid rgba(255,255,255,.17);
      display: grid;
      gap: 8px;
      font-size: .95rem;
    }

    .gifts li {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #fdf8ff;
    }

    .gifts li::before { content: "🎁"; }

    .burst {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 3px;
      opacity: 0;
      pointer-events: none;
      z-index: 99;
      animation: confetti .95s cubic-bezier(.12,.73,.35,1) forwards;
    }

    @keyframes confetti {
      0% { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(.2); opacity: 0; }
    }

    @media (max-width: 900px) {
      body { overflow-y: auto; }
      .main { grid-template-columns: 1fr; }
      .wheel-wrap { width: min(84vw, 500px); }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="stars"></div>

  <main class="container">
    <section class="panel">
      <header class="heading">
        <h1>🎂 生日礼物随机大转盘</h1>
        <p class="subtitle">抽中哪份惊喜，就把好运和快乐都打包带回家 ✨</p>
      </header>

      <div class="main">
        <div class="wheel-wrap">
          <div class="pointer" aria-hidden="true"></div>
          <div class="wheel" id="wheel"></div>
          <div class="hub">生日<br/>锦鲤</div>
        </div>

        <aside class="side">
          <div class="controls">
            <button id="spinBtn">🎉 立即抽奖</button>
            <button id="resetBtn">🔄 重置转盘</button>
          </div>

          <div id="result" class="result">准备好了吗？点击“立即抽奖”，看看你的生日惊喜礼物！</div>

          <p class="gift-title">本次奖池</p>
          <ul class="gifts" id="giftList"></ul>
        </aside>
      </div>
    </section>
  </main>

  <script>
    const gifts = [
      '新款 Apple Watch',
      '大疆 Pocket 3',
      '公路自行车',
      '香奈儿眼影',
      '5000 元现金'
    ];

    const wheel = document.getElementById('wheel');
    const result = document.getElementById('result');
    const spinBtn = document.getElementById('spinBtn');
    const resetBtn = document.getElementById('resetBtn');
    const giftList = document.getElementById('giftList');

    const slice = 360 / gifts.length;
    let currentRotate = 0;
    let spinning = false;

    gifts.forEach((gift, idx) => {
      const li = document.createElement('li');
      li.textContent = gift;
      giftList.appendChild(li);

      const label = document.createElement('div');
      label.className = 'segment-label';
      const angle = idx * slice + slice / 2 - 90;
      label.style.transform = `rotate(${angle}deg) translate(8%, -50%)`;
      label.textContent = gift;
      wheel.appendChild(label);
    });

    function burst() {
      for (let i = 0; i < 130; i++) {
        const dot = document.createElement('span');
        dot.className = 'burst';
        dot.style.left = `${window.innerWidth / 2}px`;
        dot.style.top = `${window.innerHeight * 0.42}px`;
        dot.style.background = ['#ffcf6f', '#ff66b4', '#72f4ff', '#a784ff', '#ffffff'][i % 5];
        dot.style.setProperty('--tx', `${(Math.random() - 0.5) * 760}px`);
        dot.style.setProperty('--ty', `${(Math.random() - 0.42) * 640}px`);
        dot.style.setProperty('--rot', `${Math.random() * 620 - 310}deg`);
        document.body.appendChild(dot);
        dot.addEventListener('animationend', () => dot.remove());
      }
    }

    spinBtn.addEventListener('click', () => {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      result.textContent = '大转盘旋转中... 生日好运正在为你挑选礼物 ✨';

      const winner = Math.floor(Math.random() * gifts.length);
      const centerAngle = winner * slice + slice / 2;
      const target = 360 - centerAngle;
      const rounds = 7 + Math.floor(Math.random() * 2);

      currentRotate += rounds * 360 + target - (currentRotate % 360);
      wheel.style.transform = `rotate(${currentRotate}deg)`;

      setTimeout(() => {
        result.textContent = `🎊 恭喜！你抽中了「${gifts[winner]}」！愿你这一岁被爱包围，生日快乐！`;
        burst();
        spinning = false;
        spinBtn.disabled = false;
      }, 5700);
    });

    resetBtn.addEventListener('click', () => {
      currentRotate = 0;
      wheel.style.transition = 'transform .8s ease';
      wheel.style.transform = 'rotate(0deg)';
      result.textContent = '转盘已重置，下一次抽奖也会是满满惊喜 🎁';

      setTimeout(() => {
        wheel.style.transition = 'transform 5.6s cubic-bezier(.15,.94,.2,1)';
      }, 850);
    });
  </script>
</body>
</html>
